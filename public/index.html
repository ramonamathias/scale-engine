<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScaleEngine</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f1ea; 
            margin: 0; 
            padding: 50px 20px; 
            color: #2b2927; 
        }
        .container { max-width: 1000px; margin: auto; }
        
        .header { 
            margin-bottom: 40px; 
            border-bottom: 1px solid #e2ded5; 
            padding-bottom: 24px; 
        }
        h1 { 
            margin: 0; 
            color: #2b2927; 
            font-size: 32px; 
            font-weight: 700;
            letter-spacing: -0.04em;
        }
        .subtitle { 
            color: #706b64; 
            margin: 6px 0 0 0; 
            font-size: 15px;
            font-weight: 400;
        }
        
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
        .metric-card { 
            background: #faf8f5; 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid #e2ded5;
        }
        .metric-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #706b64; }
        .metric-value { font-size: 28px; font-weight: 600; margin-top: 6px; color: #2b2927; font-family: monospace; }
        
        .input-section {
            background: #faf8f5;
            padding: 24px;
            border-radius: 8px;
            border: 1px solid #e2ded5;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .input-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #706b64;
            margin-bottom: 6px;
            display: block;
        }
        input[type="text"] {
            width: 100%;
            background: #ffffff;
            border: 1px solid #e2ded5;
            border-radius: 6px;
            padding: 10px 12px;
            box-sizing: border-box;
            font-size: 14px;
            color: #2b2927;
            margin-bottom: 4px;
        }
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #2b2927;
        }
        textarea {
            width: 100%;
            height: 100px;
            background: #ffffff;
            border: 1px solid #e2ded5;
            border-radius: 6px;
            padding: 12px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
            color: #2b2927;
            resize: vertical;
        }

        .actions { display: flex; gap: 12px; margin-top: 16px; }
        button { font-weight: 500; border: none; padding: 10px 20px; font-size: 14px; border-radius: 6px; cursor: pointer; transition: background 0.15s ease; }
        .btn-primary { 
            background-color: #2b2927; 
            color: #faf8f5; 
        }
        .btn-primary:hover { background-color: #494541; }
        .btn-stress { 
            background-color: #fce7f3; 
            color: #be123c;
            border: 1px solid #fbcfe8;
        }
        .btn-stress:hover { background-color: #fbcfe8; }
        
        .table-container { 
            background: #faf8f5; 
            border-radius: 8px; 
            border: 1px solid #e2ded5; 
            overflow: hidden; 
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px 20px; border-bottom: 1px solid #e2ded5; font-size: 14px; }
        th { background-color: #edeae0; color: #706b64; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        
        code { font-family: monospace; color: #494541; font-size: 13px; background: #edeae0; padding: 3px 6px; border-radius: 4px; border: 1px solid #e2ded5; }
        .worker-tag { background: #edeae0; padding: 4px 8px; border-radius: 4px; font-size: 12px; color: #2b2927; font-family: monospace; border: 1px solid #e2ded5; font-weight: 500; }
        .status-processing { color: #b45309; font-family: monospace; font-size: 13px; font-weight: 500; }
        .btn-download { background: #faf8f5; color: #047857; padding: 6px 12px; font-size: 12px; border-radius: 4px; cursor: pointer; font-weight: 500; border: 1px solid #a7f3d0; transition: all 0.15s ease; }
        .btn-download:hover { background: #047857; color: #faf8f5; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ScaleEngine</h1>
        <p class="subtitle">Distributed Multi-Worker Task Queue System</p>
    </div>

    <div class="metrics-grid">
        <div class="metric-card">
            <div class="metric-label">System Status</div>
            <div class="metric-value" style="color: #047857;">READY</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Active Queue Depth</div>
            <div class="metric-value" id="queue-depth-counter">0</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Total Jobs Handled</div>
            <div class="metric-value" id="total-jobs-counter">0</div>
        </div>
    </div>
    
    <div class="input-section">
        <div class="form-group">
            <label class="input-label" for="task-filename">Target Report Name / Identifier</label>
            <input type="text" id="task-filename" placeholder="e.g., Q2_Financial_Statement, My_Notes, Test_Run">
        </div>
        
        <div class="form-group">
            <label class="input-label" for="task-content">Task Data Payload (Custom File Content)</label>
            <textarea id="task-content" placeholder="Type or paste the custom content you want the asynchronous background worker node to process..."></textarea>
        </div>

        <div class="actions">
            <button class="btn-primary" onclick="dispatchTask()">Queue Named Task</button>
            <button class="btn-stress" onclick="runStressTest()">Trigger Stress-Test (10 Generated Tasks)</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Task Reference</th>
                    <th>Processing Node</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="task-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    let totalJobs = 0;
    let currentQueueDepth = 0;

    function updateCounters() {
        const totalCounter = document.getElementById('total-jobs-counter');
        const queueCounter = document.getElementById('queue-depth-counter');
        if (totalCounter) totalCounter.innerText = totalJobs;
        if (queueCounter) queueCounter.innerText = currentQueueDepth;
    }

    async function dispatchTask(customText = null, customName = null) {
        if (!customText) {
            const contentField = document.getElementById('task-content');
            const nameField = document.getElementById('task-filename');
            
            customText = contentField.value.trim() || "Default Payload Content.";
            customName = nameField.value.trim() || null;
            
            // Reset input UI fields after data extraction
            contentField.value = "";
            nameField.value = "";
        }

        totalJobs++;
        currentQueueDepth++;
        updateCounters();

        try {
            const response = await fetch('/enqueue', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    taskType: 'GENERATE_PDF',
                    userContent: customText,
                    customName: customName // Pass the user specified file identifier name to backend
                })
            });
            const data = await response.json();
            const taskId = data.taskId;

            const tableBody = document.getElementById('task-table-body');
            if (!tableBody) return;

            const row = document.createElement('tr');
            row.id = `row-${taskId}`;
            row.innerHTML = `
                <td><code>${customName || taskId}</code></td>
                <td id="node-${taskId}"><span style="color: #948e85; font-style: italic;">Allocating...</span></td>
                <td id="cell-${taskId}"><span class="status-processing">Processing</span></td>
            `;
            tableBody.insertBefore(row, tableBody.firstChild);

            const poll = setInterval(async () => {
                try {
                    const res = await fetch(`/status/${taskId}`);
                    const statusData = await res.json();
                    
                    if (statusData && statusData.state === 'Completed') {
                        const targetCell = document.getElementById(`cell-${taskId}`);
                        const targetNode = document.getElementById(`node-${taskId}`);
                        
                        if (targetCell && targetNode) {
                            targetNode.innerHTML = `<span class="worker-tag">${statusData.processedBy || 'Worker'}</span>`;
                            targetCell.innerHTML = `
                                <a href="${statusData.downloadUrl}" target="_blank">
                                    <button class="btn-download">View Output</button>
                                </a>
                            `;
                            currentQueueDepth = Math.max(0, currentQueueDepth - 1);
                            updateCounters();
                        }
                        clearInterval(poll);
                    }
                } catch (err) {
                    console.error("Polling error:", err);
                }
            }, 1000);

        } catch (error) {
            console.error("Dispatch error:", error);
        }
    }

    function runStressTest() {
        for(let i = 0; i < 10; i++) {
            setTimeout(() => { 
                dispatchTask(`Automated Bulk Stress-Test Load Payload Data String Node #${i+1}`, `Stress_Report_${i+1}`); 
            }, i * 150);
        }
    }
</script>
</body>
</html>
